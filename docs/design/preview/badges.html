<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../ui_kits/website-v2/tokens.css">
<style>body{padding:20px}.h{font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}.r{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}.tag{font-family:var(--font-mono);font-size:11px;font-weight:600;padding:3px 8px;border:1px solid var(--ink);color:var(--ink);background:var(--bg);letter-spacing:0.03em;text-transform:uppercase}.tag-a{background:var(--accent);border-color:var(--ink)}.tag-i{background:var(--ink);color:var(--bg)}.div{border:0;border-top:1.5px solid var(--ink);margin:14px 0}.cnt{background:var(--bg);border:1.5px solid var(--ink);box-shadow:4px 4px 0 var(--ink);padding:18px;max-width:340px}</style>
</head><body>
<div class="h">// TAGS (uppercase mono)</div>
<div class="r"><span class="tag">CURSOR</span><span class="tag">VIBE</span><span class="tag">NEXT</span><span class="tag">TAILWIND</span><span class="tag">NOTION</span><span class="tag">GAS</span></div>
<hr class="div">
<div class="h">// EMPHASIS (accent + inverted)</div>
<div class="r"><span class="tag tag-a">FEATURED</span><span class="tag tag-i">SOLD OUT</span><span class="tag">DRAFT</span></div>
<hr class="div">
<div class="h">// IN CONTEXT</div>
<div class="cnt">
<div style="display:flex;justify-content:space-between;align-items:baseline;padding-bottom:10px;border-bottom:1px solid var(--ink);margin-bottom:10px"><span style="font-family:var(--font-mono);font-size:12px;color:var(--muted);font-weight:600">SKU 01</span><span style="font-family:var(--font-mono);font-size:12px;color:var(--accent);font-weight:600">₩29,000</span></div>
<div style="font-size:18px;font-weight:800;letter-spacing:-0.02em;color:var(--ink);margin-bottom:6px">요한 OS 노션 템플릿</div>
<div style="font-size:13px;color:var(--ink-2);margin-bottom:12px">개인 운영 시스템 풀 패키지</div>
<div class="r" style="margin-bottom:0"><span class="tag">NOTION</span><span class="tag">SYSTEM</span><span class="tag tag-a">FEATURED</span></div>
</div>
</body></html>

<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../ui_kits/website-v2/tokens.css">
<style>body{padding:24px}.g{margin-bottom:24px}.gl{font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px}.r{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 22px;font-size:14px;font-weight:700;font-family:var(--font-sans);border:1.5px solid var(--ink);box-shadow:4px 4px 0 var(--ink);background:var(--bg);color:var(--ink);cursor:pointer;white-space:nowrap}.btn-sm{padding:8px 14px;font-size:12px;box-shadow:2px 2px 0 var(--ink)}.btn-lg{padding:18px 28px;font-size:16px}.btn-p{background:var(--accent);color:var(--ink)}.btn-pressed{transform:translate(2px,2px);box-shadow:0 0 0 var(--ink)}.btn-d{opacity:0.4;pointer-events:none}.lab{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:6px;text-align:center}</style>
</head><body>
<div class="g"><div class="gl">// PRIMARY (accent)</div><div class="r">
<div><button class="btn btn-sm btn-p">SMALL →</button><div class="lab">SM</div></div>
<div><button class="btn btn-p">포트폴리오 보기 →</button><div class="lab">DEFAULT</div></div>
<div><button class="btn btn-lg btn-p">포트폴리오 보기 →</button><div class="lab">LG</div></div>
<div><button class="btn btn-p btn-pressed">PRESSED →</button><div class="lab">:active</div></div>
<div><button class="btn btn-p btn-d">DISABLED</button><div class="lab">disabled</div></div>
</div></div>
<div class="g"><div class="gl">// GHOST (outline)</div><div class="r">
<div><button class="btn">블로그 읽기</button><div class="lab">DEFAULT</div></div>
<div><button class="btn btn-pressed">PRESSED</button><div class="lab">:active</div></div>
<div><button class="btn btn-d">DISABLED</button><div class="lab">disabled</div></div>
</div></div>
<div class="g"><div class="gl">// CTA (small mono — header / store)</div><div class="r">
<div><button class="btn btn-sm btn-p" style="font-family:var(--font-mono);letter-spacing:0.05em">CONTACT →</button><div class="lab">HEADER</div></div>
<div><button class="btn btn-sm btn-p" style="font-family:var(--font-mono);letter-spacing:0.05em">BUY →</button><div class="lab">STORE</div></div>
<div><button class="btn btn-sm" style="font-family:var(--font-mono);letter-spacing:0.05em">모두 보기 →</button><div class="lab">SEE ALL</div></div>
</div></div>
</body></html>

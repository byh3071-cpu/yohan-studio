<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../ui_kits/website-v2/tokens.css">
<style>body{padding:48px 32px}
.g{display:grid;grid-template-columns:1.4fr 1fr;gap:32px;align-items:start;max-width:900px}
.eyb{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;display:flex;align-items:center;gap:10px}
.em{display:inline-block;width:18px;height:7px;background:var(--accent)}
.t{font-size:clamp(38px,6vw,68px);font-weight:800;line-height:0.96;letter-spacing:-0.04em;color:var(--ink);margin-bottom:24px}
.acc{color:var(--accent)}
.sub{font-size:15px;line-height:1.65;color:var(--ink-2);max-width:440px;margin-bottom:28px;border-left:3px solid var(--ink);padding-left:14px}
.row{display:flex;gap:12px;flex-wrap:wrap}

.btn-p{background:var(--accent)}
.meta{background:var(--surface);border:1.5px solid var(--ink);box-shadow:4px 4px 0 var(--ink);padding:20px}
.mt{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--ink)}
.mr{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px dashed var(--muted-2)}
.mr:last-child{border-bottom:0}
.mk{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.mv{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap}
.live{display:inline-flex;align-items:center;gap:5px}
.live-d{width:7px;height:7px;background:var(--accent);display:inline-block}
</style>
</head><body>
<div class="g">

</div>
</body></html>

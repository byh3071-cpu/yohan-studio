<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../ui_kits/website-v2/tokens.css">
<style>body{margin:0;background:var(--bg)}
header{height:64px;background:var(--bg);border-bottom:1.5px solid var(--ink);display:flex;align-items:center;padding:0 24px;justify-content:space-between}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.03em;color:var(--ink);white-space:nowrap;display:inline-flex;align-items:center}
.dot{display:inline-block;width:9px;height:9px;background:var(--accent);margin:0 0 0 4px}
nav{display:flex;align-items:center;gap:2px}
.nav-l{padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap}
.nav-l-a{border-left:2px solid var(--accent)}
.cta{font-family:var(--font-mono);font-size:12px;font-weight:700;padding:8px 14px;background:var(--accent);color:var(--ink);border:1.5px solid var(--ink);box-shadow:2px 2px 0 var(--ink);margin-left:10px;letter-spacing:0.05em;white-space:nowrap}
.lab{font-family:var(--font-mono);font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:18px 24px 6px}
.mh{width:375px;height:60px;border:1.5px solid var(--ink);box-shadow:4px 4px 0 var(--ink);margin:0 24px 24px;background:var(--bg);display:flex;align-items:center;padding:0 16px;justify-content:space-between}
.menu{font-family:var(--font-mono);font-size:14px;font-weight:700;padding:6px 10px;border:1.5px solid var(--ink)}
</style>
</head><body>
<header>
<a class="logo">YOHAN<span class="dot"></span><span style="margin-left:8px">STUDIO</span></a>
<nav>
<a class="nav-l nav-l-a">홈</a><a class="nav-l">블로그</a><a class="nav-l">포트폴리오</a><a class="nav-l">스토어</a>
<span class="cta">CONTACT →</span>
</nav>
</header>
<div class="lab">// MOBILE 375px</div>
<div class="mh"><span class="logo" style="font-size:15px">YOHAN<span class="dot"></span><span style="margin-left:6px">STUDIO</span></span><span class="menu">≡ MENU</span></div>
</body></html>

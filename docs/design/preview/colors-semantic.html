<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../ui_kits/website-v2/tokens.css">
<style>body{padding:20px}.g{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.t{border:1.5px solid var(--ink);box-shadow:2px 2px 0 var(--ink);background:var(--bg)}.sw{height:36px;border-bottom:1.5px solid var(--ink)}.i{padding:6px 8px}.n{font-size:11px;font-weight:700;color:var(--ink)}.v{font-size:10px;font-family:var(--font-mono);color:var(--muted)}</style>
</head><body><div class="g">
<div class="t"><div class="sw" style="background:#F4F1EA"></div><div class="i"><div class="n">--bg</div><div class="v">#F4F1EA</div></div></div>
<div class="t"><div class="sw" style="background:#EEEAE0"></div><div class="i"><div class="n">--surface</div><div class="v">#EEEAE0</div></div></div>
<div class="t"><div class="sw" style="background:#E5E0D2"></div><div class="i"><div class="n">--surface-2</div><div class="v">#E5E0D2</div></div></div>
<div class="t"><div class="sw" style="background:#0A0A0A"></div><div class="i"><div class="n">--ink</div><div class="v">#0A0A0A</div></div></div>
<div class="t"><div class="sw" style="background:#2B2723"></div><div class="i"><div class="n">--ink-2</div><div class="v">#2B2723</div></div></div>
<div class="t"><div class="sw" style="background:#6B6357"></div><div class="i"><div class="n">--muted</div><div class="v">#6B6357</div></div></div>
<div class="t"><div class="sw" style="background:#968D7E"></div><div class="i"><div class="n">--muted-2</div><div class="v">#968D7E</div></div></div>
<div class="t"><div class="sw" style="background:#FF5C28"></div><div class="i"><div class="n">--accent</div><div class="v">#FF5C28</div></div></div>
</div></body></html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor 30분으로 MVP 만든 후기 · 요한 스튜디오</title>
<link rel="stylesheet" href="tokens.css">
<script src="theme-init.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="V2Header.jsx"></script>
<script type="text/babel" src="V2Footer.jsx"></script>
<script type="text/babel" src="V2BlogPost.jsx"></script>
<style>
  /* Mobile: hide ToC sidebar, collapse to single column */
  @media (max-width: 960px) {
    .post-shell { grid-template-columns: 1fr !important; gap: 32px !important; }
    .post-toc { display: none !important; }
  }
  @media (max-width: 720px) {
    header nav a:not(:last-child) { display: none; }
    header nav button { margin-left: 0 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const POST = {
  title: 'Cursor 30분으로 MVP 만든 후기',
  date: '2026.04.10',
  readTime: '8 MIN READ',
  tags: ['CURSOR', 'VIBE', 'MVP'],
  prev: 'GAS로 카페 자동화한 방법',
  next: '노션으로 1인 기업 운영하기',
  sections: [
    { type: 'p', text: '처음엔 반신반의했다. AI가 정말로 코드를 짜줄 수 있을까. 카페에서 일하면서 짬짬이 노션과 자동화를 만지작거리던 나에게 "코드"는 여전히 멀리 있는 단어였다. 그런데 Cursor를 켜고 30분 만에 첫 MVP가 나왔다. 그 30분 동안 무슨 일이 있었는지 그대로 적는다.' },
    { type: 'quote', text: '바이브코딩은 코드를 짜는 것이 아니다. 결과물에 대한 감각을 코드에게 옮기는 것이다.' },

    { type: 'h2', text: '1. 시작 — 빈 폴더와 한 줄 프롬프트' },
    { type: 'p', text: 'Cursor를 처음 켰을 때 어디서부터 시작해야 할지 막막했다. 일단 빈 폴더를 만들고 Cmd+L로 채팅 패널을 띄웠다. 거기에 한 줄을 적었다.' },
    { type: 'code', lang: 'prompt', file: 'cursor chat', html: '<span style="color:#94A3B8">// 첫 프롬프트</span>\nNext.js + Tailwind로 자리 랜덤 배치하는\n간단한 웹앱을 만들어줘. <span style="color:#FF5C28">이름 4명을 입력하면</span>\n<span style="color:#FF5C28">2x2 그리드에 셔플해서 배치</span>해주는 식.' },
    { type: 'p', text: '이게 전부였다. Cursor는 즉시 폴더 구조를 제안했고, package.json을 만들고, app/page.tsx를 채우기 시작했다. 나는 그저 Tab을 누르거나 거절하기만 하면 됐다.' },

    { type: 'h2', text: '2. 막힌 지점들 — 그래도 사람이 필요했다' },
    { type: 'p', text: 'AI가 모든 걸 다 해주진 않는다. 막힌 지점이 세 번 있었다. 첫 번째는 Tailwind 설정에서 빠진 import 한 줄. Cursor가 만든 globals.css에 디렉티브가 누락돼 있었다.' },
    { type: 'h3', text: '문제 1 — Tailwind import 누락' },
    { type: 'code', lang: 'css', file: 'app/globals.css', html: '<span style="color:#FF5C28">@import</span> <span style="color:#94A3B8">"tailwindcss"</span>;\n\n<span style="color:#94A3B8">/* AI가 처음에 이 줄을 빼먹었다 */</span>\n<span style="color:#FF5C28">@tailwind</span> base;\n<span style="color:#FF5C28">@tailwind</span> components;\n<span style="color:#FF5C28">@tailwind</span> utilities;' },
    { type: 'p', text: '두 번째는 셔플 함수가 결정론적이라 같은 입력엔 같은 결과만 나오는 문제. Math.random을 빼먹고 useEffect 의존성에 시드를 안 넣었다. 한 줄 짜는 데도 사람의 확인이 필요했다.' },

    { type: 'h3', text: '문제 2 — useEffect 의존성' },
    { type: 'code', lang: 'tsx', file: 'app/page.tsx', html: '<span style="color:#FF5C28">useEffect</span>(<span style="color:#94A3B8">()</span> => {\n  setSeats(<span style="color:#FF5C28">shuffle</span>(names));\n}, [names]); <span style="color:#94A3B8">// names 바뀔 때만 셔플</span>' },

    { type: 'h2', text: '3. 배포까지 — Vercel 3분' },
    { type: 'p', text: '코드가 돌아가는 걸 확인하고 GitHub에 푸시했다. Vercel에 연결하니 3분 만에 도메인이 떴다. 끝. 진짜 30분짜리 MVP였다.' },
    { type: 'list', items: [
      '폴더 만들고 Cursor 켜기 — 1분',
      '프롬프트 던지고 Tab 연타 — 18분',
      '막힌 지점 디버깅 — 8분',
      'GitHub 푸시 + Vercel 배포 — 3분',
    ] },

    { type: 'image', placeholder: 'SCREENSHOT / 플렉시블 MVP', caption: '결과물 — 플렉시블 v0.1' },

    { type: 'h2', text: '4. 배운 것' },
    { type: 'p', text: '바이브코딩은 코드를 안 보는 게 아니다. 오히려 더 자주, 더 빨리 본다. 다만 "내가 짜는" 것이 아니라 "AI가 짠 것을 내가 판단하는" 방식으로. 이 변화가 1인 기업에게 무슨 의미인지는 다음 글에서 정리한다.' },
  ],
};

const App = () => (
  <div>
    <V2Header />
    <V2BlogPost post={POST} />
    <V2Footer />
  </div>
);
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

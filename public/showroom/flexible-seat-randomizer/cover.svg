<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">익명화한 랜덤 자리배치 웹앱 재구성 화면</title>
  <desc id="desc">가상 참여자 일부를 좌석에 배치한 포트폴리오용 재구성 이미지</desc>
  <rect width="1600" height="900" fill="#f4f1ea"/>
  <rect x="70" y="70" width="1460" height="760" fill="#eeeae0" stroke="#0a0a0a" stroke-width="5"/>
  <rect x="92" y="92" width="1460" height="760" fill="none" stroke="#0a0a0a" stroke-width="5"/>
  <text x="130" y="155" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#ff5c28">CASE STUDY · ANONYMIZED RECONSTRUCTION</text>
  <text x="130" y="225" font-family="Arial, sans-serif" font-size="64" font-weight="800" fill="#0a0a0a">출석 기반 자리배치</text>
  <text x="130" y="280" font-family="Arial, sans-serif" font-size="30" fill="#2b2723">종이 제비 2~3분 → 현장 기록 기준 10초 이내</text>
  <g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
    <g fill="#fff" stroke="#0a0a0a" stroke-width="4">
      <rect x="130" y="360" width="240" height="110"/><rect x="430" y="360" width="240" height="110"/><rect x="730" y="360" width="240" height="110"/><rect x="1030" y="360" width="240" height="110"/>
      <rect x="130" y="520" width="240" height="110"/><rect x="430" y="520" width="240" height="110"/><rect x="730" y="520" width="240" height="110"/><rect x="1030" y="520" width="240" height="110"/>
      <rect x="280" y="680" width="240" height="90"/><rect x="580" y="680" width="240" height="90"/><rect x="880" y="680" width="240" height="90"/>
    </g>
    <g fill="#0a0a0a">
      <text x="250" y="425">가상 참여자 01</text><text x="550" y="425">가상 참여자 02</text><text x="850" y="425">가상 참여자 03</text><text x="1150" y="425">가상 참여자 04</text>
      <text x="250" y="585">가상 참여자 05</text><text x="550" y="585">가상 참여자 06</text><text x="850" y="585">가상 참여자 07</text><text x="1150" y="585">가상 참여자 08</text>
      <text x="400" y="735">고정 좌석 A</text><text x="700" y="735">가상 참여자 09</text><text x="1000" y="735">고정 좌석 B</text>
    </g>
  </g>
  <rect x="1320" y="360" width="150" height="270" fill="#ff5c28" stroke="#0a0a0a" stroke-width="4"/>
  <text x="1395" y="480" transform="rotate(90 1395 480)" font-family="Arial, sans-serif" font-size="25" font-weight="800" text-anchor="middle" fill="#0a0a0a">자리 섞기</text>
</svg>

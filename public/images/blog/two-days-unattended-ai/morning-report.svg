<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="1280" height="720" fill="#f2f3f4"/>

  <!-- 보고서 카드 -->
  <rect x="60" y="40" width="1160" height="640" rx="12" fill="#ffffff" stroke="#d5dbdb" stroke-width="2"/>

  <!-- 헤더 -->
  <text x="100" y="100" font-size="26" font-weight="800" fill="#1c2226">🌙 결함루프 아침 보고</text>
  <text x="100" y="130" font-size="15" fill="#5c6870">2026-07-04 밤 실행분 · 자동 생성 문서 (docs/audits/overnight-2026-07-04.md 실제 내용)</text>
  <line x1="100" y1="150" x2="1180" y2="150" stroke="#dde3e3" stroke-width="1"/>

  <!-- 결론 박스 -->
  <rect x="100" y="170" width="1080" height="66" rx="8" fill="#e2efee" stroke="#0e7c7b" stroke-width="2"/>
  <text x="120" y="197" font-size="17" font-weight="700" fill="#0e5958">결론: 밤사이 만든 수정 제안 4건 전부 검증 통과, 반영(머지)은 0건 — 규칙 준수.</text>
  <text x="120" y="222" font-size="15" fill="#33625f">단, 실제 결함은 2개다 — 같은 결함을 2건씩 고친 중복 쌍 2개. 쌍마다 1건만 반영하고 나머지는 폐기 권고.</text>

  <!-- 표 헤더 -->
  <rect x="100" y="260" width="1080" height="44" fill="#f2f6f6"/>
  <text x="120" y="288" font-size="15" font-weight="700" fill="#5c6870">제안</text>
  <text x="230" y="288" font-size="15" font-weight="700" fill="#5c6870">고친 결함 (실측 근거 포함)</text>
  <text x="880" y="288" font-size="15" font-weight="700" fill="#5c6870">심각도</text>
  <text x="1010" y="288" font-size="15" font-weight="700" fill="#5c6870">아침 권고</text>

  <!-- 행 1: #38 머지 -->
  <line x1="100" y1="304" x2="1180" y2="304" stroke="#e8ecec" stroke-width="1"/>
  <text x="120" y="338" font-size="16" font-weight="700" fill="#1c2226">#38</text>
  <text x="230" y="331" font-size="15" fill="#1c2226">예약 작업 실행기가 커밋된 설정에서 즉사 (KeyError)</text>
  <text x="230" y="352" font-size="13" fill="#8a949a">수정 전 재현 → 수정 후 완주 → 원상태에서 같은 에러 재발 증명</text>
  <rect x="875" y="318" width="52" height="26" rx="13" fill="#fbeeea"/>
  <text x="901" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#b3452e">high</text>
  <rect x="1005" y="318" width="66" height="26" rx="13" fill="#e9f4ec"/>
  <text x="1038" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d4f">머지</text>

  <!-- 행 2: #35 중복 -->
  <line x1="100" y1="368" x2="1180" y2="368" stroke="#e8ecec" stroke-width="1"/>
  <text x="120" y="402" font-size="16" font-weight="700" fill="#8a949a">#35</text>
  <text x="230" y="395" font-size="15" fill="#5c6870">위와 같은 결함 — 다른 에이전트가 또 고침</text>
  <text x="230" y="416" font-size="13" fill="#8a949a">#38과 같은 파일 수정 — 둘 다 반영하면 충돌</text>
  <rect x="875" y="382" width="52" height="26" rx="13" fill="#fbeeea"/>
  <text x="901" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#b3452e">high</text>
  <rect x="1005" y="382" width="110" height="26" rx="13" fill="#f2f3f4" stroke="#c5cccc" stroke-width="1"/>
  <text x="1060" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#5c6870">폐기 (중복)</text>

  <!-- 행 3: #36 머지 -->
  <line x1="100" y1="432" x2="1180" y2="432" stroke="#e8ecec" stroke-width="1"/>
  <text x="120" y="466" font-size="16" font-weight="700" fill="#1c2226">#36</text>
  <text x="230" y="459" font-size="15" fill="#1c2226">발행 브랜치가 이전 발행물을 물고 들어감 (승인 게이트 오염)</text>
  <text x="230" y="480" font-size="13" fill="#8a949a">거부한 글이 다음 발행에 섞여 나갈 수 있던 결함 — 회귀 테스트 추가</text>
  <rect x="875" y="446" width="52" height="26" rx="13" fill="#fbeeea"/>
  <text x="901" y="464" text-anchor="middle" font-size="13" font-weight="700" fill="#b3452e">high</text>
  <rect x="1005" y="446" width="66" height="26" rx="13" fill="#e9f4ec"/>
  <text x="1038" y="464" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d4f">머지</text>

  <!-- 행 4: #39 중복 -->
  <line x1="100" y1="496" x2="1180" y2="496" stroke="#e8ecec" stroke-width="1"/>
  <text x="120" y="530" font-size="16" font-weight="700" fill="#8a949a">#39</text>
  <text x="230" y="523" font-size="15" fill="#5c6870">위와 같은 결함 — 코드가 사실상 바이트 단위 동일</text>
  <text x="230" y="544" font-size="13" fill="#8a949a">차이는 주석 문구뿐 (직접 비교) — 폐기해도 잃는 것 없음</text>
  <rect x="875" y="510" width="52" height="26" rx="13" fill="#fbeeea"/>
  <text x="901" y="528" text-anchor="middle" font-size="13" font-weight="700" fill="#b3452e">high</text>
  <rect x="1005" y="510" width="110" height="26" rx="13" fill="#f2f3f4" stroke="#c5cccc" stroke-width="1"/>
  <text x="1060" y="528" text-anchor="middle" font-size="13" font-weight="700" fill="#5c6870">폐기 (중복)</text>
  <line x1="100" y1="560" x2="1180" y2="560" stroke="#e8ecec" stroke-width="1"/>

  <!-- 하단 강조 밴드 -->
  <rect x="100" y="590" width="1080" height="60" rx="8" fill="#fdf6e3" stroke="#b3800a" stroke-width="2"/>
  <text x="120" y="617" font-size="16" font-weight="700" fill="#7a5806">AI는 권고까지만 한다 — 머지 버튼은 이 보고를 읽는 사람이 누른다</text>
  <text x="120" y="640" font-size="14" fill="#8a6a1c">그밖에 미시도 결함 20건은 목록으로 이월 · 4건 전부 독립 AI의 적대 리뷰(approve) 통과 후에야 제안됨</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="1280" height="560" fill="#ffffff"/>

  <!-- step 1: AI 수정 -->
  <rect x="40" y="120" width="250" height="150" rx="10" fill="#f2f6f6" stroke="#c4d2d2" stroke-width="2"/>
  <text x="165" y="175" text-anchor="middle" font-size="26" font-weight="700" fill="#1c2226">AI가 코드를</text>
  <text x="165" y="210" text-anchor="middle" font-size="26" font-weight="700" fill="#1c2226">고친다</text>
  <text x="165" y="245" text-anchor="middle" font-size="17" fill="#5c6870">테스트 통과까지 스스로 반복</text>

  <!-- arrow 1→2 -->
  <line x1="290" y1="195" x2="360" y2="195" stroke="#1c2226" stroke-width="3"/>
  <polygon points="360,195 346,187 346,203" fill="#1c2226"/>

  <!-- step 2: 적대 검증 -->
  <rect x="365" y="120" width="250" height="150" rx="10" fill="#e2efee" stroke="#0e7c7b" stroke-width="3"/>
  <text x="490" y="175" text-anchor="middle" font-size="26" font-weight="700" fill="#0e5958">다른 AI가</text>
  <text x="490" y="210" text-anchor="middle" font-size="26" font-weight="700" fill="#0e5958">공격한다</text>
  <text x="490" y="245" text-anchor="middle" font-size="17" fill="#33625f">"틀렸다"를 증명하러 달려듦</text>

  <!-- arrow 2→3 (통과) -->
  <line x1="615" y1="195" x2="685" y2="195" stroke="#0e7c7b" stroke-width="3"/>
  <polygon points="685,195 671,187 671,203" fill="#0e7c7b"/>
  <text x="650" y="180" text-anchor="middle" font-size="16" font-weight="700" fill="#0e7c7b">통과</text>

  <!-- step 3: PR -->
  <rect x="690" y="120" width="250" height="150" rx="10" fill="#f2f6f6" stroke="#c4d2d2" stroke-width="2"/>
  <text x="815" y="175" text-anchor="middle" font-size="26" font-weight="700" fill="#1c2226">변경 제안서(PR)</text>
  <text x="815" y="210" text-anchor="middle" font-size="26" font-weight="700" fill="#1c2226">제출</text>
  <text x="815" y="245" text-anchor="middle" font-size="17" fill="#5c6870">아직 반영 안 된 대기 상태</text>

  <!-- arrow 3→4 -->
  <line x1="940" y1="195" x2="1010" y2="195" stroke="#1c2226" stroke-width="3"/>
  <polygon points="1010,195 996,187 996,203" fill="#1c2226"/>

  <!-- step 4: 사람 (다른 형태 — 원형) -->
  <circle cx="1120" cy="195" r="92" fill="#fdf6e3" stroke="#b3800a" stroke-width="3"/>
  <text x="1120" y="172" text-anchor="middle" font-size="26" font-weight="700" fill="#7a5806">사람이</text>
  <text x="1120" y="207" text-anchor="middle" font-size="26" font-weight="700" fill="#7a5806">승인한다</text>
  <text x="1120" y="242" text-anchor="middle" font-size="15" fill="#8a6a1c">머지 버튼은 사람만</text>

  <!-- 반려 경로 -->
  <line x1="490" y1="270" x2="490" y2="360" stroke="#b3452e" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="490,360 482,346 498,346" fill="#b3452e"/>
  <text x="510" y="325" font-size="16" font-weight="700" fill="#b3452e">공격 성공 (결함 발견)</text>
  <rect x="365" y="365" width="250" height="90" rx="10" fill="#fbeeea" stroke="#b3452e" stroke-width="2"/>
  <text x="490" y="403" text-anchor="middle" font-size="22" font-weight="700" fill="#8f3722">반려</text>
  <text x="490" y="433" text-anchor="middle" font-size="16" fill="#8f3722">다시 고치거나 폐기</text>
  <line x1="365" y1="410" x2="165" y2="410" stroke="#b3452e" stroke-width="2" stroke-dasharray="8 6"/>
  <line x1="165" y1="410" x2="165" y2="274" stroke="#b3452e" stroke-width="2" stroke-dasharray="8 6"/>
  <polygon points="165,274 157,288 173,288" fill="#b3452e"/>

  <!-- 하단 캡션 -->
  <line x1="40" y1="500" x2="1240" y2="500" stroke="#dde3e3" stroke-width="1"/>
  <text x="640" y="535" text-anchor="middle" font-size="20" font-weight="700" fill="#1c2226">AI는 어느 단계에서도 스스로 반영(머지)할 수 없다</text>
</svg>
